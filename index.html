<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Bags</title>

   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family:'Poppins',sans-serif; background:#0a0a0a; color:#fff; }

    nav { display:flex; justify-content:space-between; padding:20px; border-bottom:1px solid #222; }

    .carrito-btn { cursor:pointer; }

    .productos { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }

    .card { background:#111; border-radius:10px; overflow:hidden; }

    .card img { width:100%; height:250px; object-fit:cover; }

    .card-content { padding:15px; text-align:center; }

    .btn { border:1px solid gold; padding:8px 15px; cursor:pointer; }

    .carrito {
      position:fixed; right:0; top:0; width:300px; height:100%;
      background:#111; padding:20px; display:none;
    }
 </style>
  
</head>
<body>

<nav>
  <h1>AURORA</h1>
  <div class="carrito-btn" onclick="toggleCarrito()">🛒 (<span id="count">0</span>)</div>
</nav>

  
<div class="categorias">
  <button onclick="filtrar('all')">Todas</button>
  <button onclick="filtrar('shoulder')">Shoulderbags</button>
  <button onclick="filtrar('tote')">Tote</button>
</div>

<section class="productos" id="productos">

<div class="card shoulder" onclick="abrirDetalle('Shoulderbag Eloisa','Elegante y versátil','$48.500')">
    <div class="badge">-20%</div>
    <img src="eloisa.jpg">
    <div class="card-content">
      <h3>Shoulderbag Eloisa Negro</h3>
      <p class="old-price">$60.000</p>
      <p class="precio">$48.500</p
  </div>
  
<div class="card shoulder" onclick="abrirDetalle('Shoulderbag Eloisa','Elegante y versátil','$32.000')">
    <img src="eloisaC.png" 
    <div class="card-content">
      <h3>Shoulderbag Eloisa Cherry</h3>
      <p class="precio">$32.000</p>
    </div>
  </div>
  
  <div class="card shoulder" onclick="abrirDetalle('Shoulderbag Eloisa','Elegante y versátil','$48.500')">
    <img src="Morgan.jpg" 
    <div class="card-content">
      <h3>Shoulderbag Morgan</h3>
      <p class="precio">$27.500</p>
    </div>
  </div>

   <div class="card tote" onclick="abrirDetalle('Tote Brillos','Diseño con detalles únicos','$XX.XXX')">
    <img src="chicago.jpg" 
    <div class="card-content">
      <h3>Bolso Chicago</h3>
      <p class="precio">$27.000</p>
    </div>
  </div>

    <div class="card shoulder" onclick="abrirDetalle('Tote Brillos','Diseño con detalles únicos','$XX.XXX')">
    <img src="erin.png" 
    <div class="card-content">
      <h3>Shoulderbag Erin</h3>
      <p class="precio">$29.500</p>
    </div>
  </div>

  <div class="card shoulder" onclick="abrirDetalle('Tote Brillos','Diseño con detalles únicos','$XX.XXX')">
    <img src="nova.jpg" 
    <div class="card-content">
      <h3>Shoulderbag Nova</h3>
      <p class="precio">$32.000</p>
    </div>
  </div>

  <div class="card tote" onclick="abrirDetalle('Tote Brillos','Diseño con detalles únicos','$XX.XXX')">
  <img src="brillos.jpg">
  <div class="card-content">
    <h3>Tote Bag Brillos</h3>
      <p class="precio">$37.500</p>
    </div>
  </div>

<div class="detalle" id="detalle">
  <div class="detalle-content">
    <h2 id="titulo"></h2>
    <p id="desc"></p>
    <p id="precio"></p>
    <a class="btn" href="https://wa.me/5492945468029" target="_blank">Comprar</a>
    <br><br>
    <button onclick="cerrarDetalle()">Cerrar</button>
  </div>
</div>
<footer>
  <p>Esquel-Chubut • Envíos a todo el país</p>
</footer>

<script>
function abrirDetalle(titulo, desc, precio){
  document.getElementById('detalle').style.display='flex';
  document.getElementById('titulo').innerText=titulo;
  document.getElementById('desc').innerText=desc;
  document.getElementById('precio').innerText=precio;
}

function cerrarDetalle(){
  document.getElementById('detalle').style.display='none';
}

function filtrar(categoria){
  let productos=document.querySelectorAll('.card');
  productos.forEach(p=>{
    p.style.display = (categoria==='all' || p.classList.contains(categoria)) ? 'block':'none';
  });
}

function buscar(texto){
  texto=texto.toLowerCase();
  document.querySelectorAll('.card').forEach(p=>{
    let nombre=p.innerText.toLowerCase();
    p.style.display = nombre.includes(texto)?'block':'none';
  });
}
</script>

</body>
</html>
