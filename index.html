<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Bags</title>

   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  
  <style>
    body { margin:0; font-family:'Poppins',sans-serif; background:#f5f5f5; color:#111; }

    nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:20px; background:#fff; border-bottom:1px solid #ddd;
      position:sticky; top:0;
    }

    h1 { font-family:'Playfair Display'; letter-spacing:2px; }

    .carrito-btn { cursor:pointer; font-weight:450; }

     .productos {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap:20px;
        padding:20px;
      }

@media (max-width: 768px) {
  .productos {
    grid-template-columns: repeat(2, 1fr);
  }
}

    .card {
      background:#fff; border-radius:12px; overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      transition:.3s;
    }

    .card:hover { transform:translateY(-5px); }

    .card img {
      width:100%; height:200px; object-fit:cover;
    }

    .card-content {
      padding:10px; text-align:center;
    }

    .card h3 { font-size:0.95em; margin:5px 0; }

    .card p { margin:5px 0; font-size:0.9em; }

    .btn {
      border:1px solid #000; padding:6px 10px; cursor:pointer;
      background:none; border-radius:20px; font-size:0.8em;
    }

    .carrito {
      position:fixed; right:-320px; top:0; width:300px; height:100%;
      background:#fff; padding:20px; transition:0.3s;
      box-shadow:-5px 0 15px rgba(0,0,0,0.1);
    }

    .carrito.active { right:0; }

    .cerrar {
      cursor:pointer; float:right; font-weight:bold;
    }
 </style>
  
</head>
<body>

<nav>
  <h1>AURORA</h1>
  <div class="carrito-btn" onclick="toggleCarrito()">🛒 (<span id="count">0</span>)</div>
</nav>

<section class="productos">

<div class="card">
  <img src="Eloisa.png">
  <div class="card-content">
      <h3>Shoulderbag Eloisa Negro</h3>
      <p class="old-price">$32.000</p>
    <button class="btn" onclick="agregar('Eloisa',32000)">Agregar</button>
  </div>
  
<div class="card">
  <img src="eloisaC.png">
  <div class="card-content">
      <h3>Shoulderbag Eloisa Cherry</h3>
       <p class="old-price">$32.000</p>
    <button class="btn" onclick="agregar('Eloisa',32000)">Agregar</button>
    </div>
  </div>
  
  <div class="card">
  <img src="Morgan.jpg">
    <div class="card-content">
      <h3>Shoulderbag Morgan</h3>
      <p class="precio">$27.500</p>
       <button class="btn" onclick="agregar('Morgan',27500)">Agregar</button>
    </div>
  </div>

  <div class="card">
    <img src="chicago.jpg" >
    <div class="card-content">
      <h3>Bolso Chicago</h3>
      <p class="precio">$27.000</p>
       <button class="btn" onclick="agregar('Chicago',27000)">Agregar</button>
    </div>
  </div>

<div class="card">
  <img src="erin.png" >
    <div class="card-content">
      <h3>Shoulderbag Erin</h3>
      <p class="precio">$29.500</p>
       <button class="btn" onclick="agregar('Erin',29500)">Agregar</button>
    </div>
  </div>

<div class="card">
  <img src="nova.jpg" >
    <div class="card-content">
      <h3>Shoulderbag Nova</h3>
      <p class="precio">$32.000</p>
       <button class="btn" onclick="agregar('Nova',32000)">Agregar</button>
    </div>
  </div>

  <div class="card">
  <img src="brillos.jpg">
  <div class="card-content">
    <h3>Tote Bag Brillos</h3>
      <p class="precio">$37.500</p>
     <button class="btn" onclick="agregar('Brillos',37500)">Agregar</button>
    </div>
  </div>

</section>

<div class="carrito" id="carrito">
  <span class="cerrar" onclick="toggleCarrito()">✕</span>
  <h2>Carrito</h2>
  <div id="items"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <a id="comprar" class="btn" target="_blank">Finalizar compra</a>
</div>

<script>
let carrito=[];

function agregar(nombre, precio){
  carrito.push({nombre, precio});
  actualizar();
}

function actualizar(){
  let items=document.getElementById('items');
  let total=0;
  items.innerHTML='';

  carrito.forEach(p=>{
    total+=p.precio;
    items.innerHTML += `<p>${p.nombre} - $${p.precio}</p>`;
  });

  document.getElementById('total').innerText=total;
  document.getElementById('count').innerText=carrito.length;

  let mensaje='Hola! Quiero comprar:%0A';
  carrito.forEach(p=> mensaje+=`${p.nombre} - $${p.precio}%0A`);
  mensaje+=`Total: $${total}`;

  document.getElementById('comprar').href=`https://wa.me/549XXXXXXXXXX?text=${mensaje}`;
}

function toggleCarrito(){
  let c=document.getElementById('carrito');
  c.classList.toggle('active');
}
</script>

</body>
</html>
