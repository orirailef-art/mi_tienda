<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Bags</title>

   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family:'Poppins',sans-serif; background:#0a0a0a; color:#fff; }

    nav { display:flex; justify-content:space-between; padding:20px; border-bottom:1px solid #222; }

    .carrito-btn { cursor:pointer; }

    .productos { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }

    .card { background:#111; border-radius:10px; overflow:hidden; }

    .card img { width:100%; height:250px; object-fit:cover; }

    .card-content { padding:15px; text-align:center; }

    .btn { border:1px solid gold; padding:8px 15px; cursor:pointer; }

    .carrito {
      position:fixed; right:0; top:0; width:300px; height:100%;
      background:#111; padding:20px; display:none;
    }
 </style>
  
</head>
<body>

<nav>
  <h1>AURORA</h1>
  <div class="carrito-btn" onclick="toggleCarrito()">🛒 (<span id="count">0</span>)</div>
</nav>

<section class="productos">

<div class="card">
  <img src="Eloisa.png">
  <div class="card-content">
      <h3>Shoulderbag Eloisa Negro</h3>
      <p class="old-price">$32.000</p>
    <button class="btn" onclick="agregar('Eloisa',32000)">Agregar</button>
  </div>
  
<div class="card">
  <img src="eloisaC.png">
  <div class="card-content">
      <h3>Shoulderbag Eloisa Cherry</h3>
       <p class="old-price">$32.000</p>
    <button class="btn" onclick="agregar('Eloisa',32000)">Agregar</button>
    </div>
  </div>
  
  <div class="card">
  <img src="Morgan.jpg">
    <div class="card-content">
      <h3>Shoulderbag Morgan</h3>
      <p class="precio">$27.500</p>
       <button class="btn" onclick="agregar('Morgan',27500)">Agregar</button>
    </div>
  </div>

  <div class="card">
    <img src="chicago.jpg" >
    <div class="card-content">
      <h3>Bolso Chicago</h3>
      <p class="precio">$27.000</p>
       <button class="btn" onclick="agregar('Chicago',27000)">Agregar</button>
    </div>
  </div>

<div class="card">
  <img src="erin.png" >
    <div class="card-content">
      <h3>Shoulderbag Erin</h3>
      <p class="precio">$29.500</p>
       <button class="btn" onclick="agregar('Erin',29500)">Agregar</button>
    </div>
  </div>

<div class="card">
  <img src="nova.jpg" >
    <div class="card-content">
      <h3>Shoulderbag Nova</h3>
      <p class="precio">$32.000</p>
       <button class="btn" onclick="agregar('Nova',32000)">Agregar</button>
    </div>
  </div>

  <div class="card">
  <img src="brillos.jpg">
  <div class="card-content">
    <h3>Tote Bag Brillos</h3>
      <p class="precio">$37.500</p>
     <button class="btn" onclick="agregar('Brillos',37500)">Agregar</button>
    </div>
  </div>

</section>

<div class="carrito" id="carrito">
  <h2>Carrito</h2>
  <div id="items"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <a id="comprar" class="btn" target="_blank">Finalizar compra</a>
</div>

<script>
let carrito=[];

function agregar(nombre, precio){
  carrito.push({nombre, precio});
  actualizar();
}

function actualizar(){
  let items=document.getElementById('items');
  let total=0;
  items.innerHTML='';

  carrito.forEach(p=>{
    total+=p.precio;
    items.innerHTML += `<p>${p.nombre} - $${p.precio}</p>`;
  });

  document.getElementById('total').innerText=total;
  document.getElementById('count').innerText=carrito.length;

  let mensaje='Hola! Quiero comprar:%0A';
  carrito.forEach(p=> mensaje+=`${p.nombre} - $${p.precio}%0A`);
  mensaje+=`Total: $${total}`;

  document.getElementById('comprar').href=`https://wa.me/5492945468029?text=${mensaje}`;
}

function toggleCarrito(){
  let c=document.getElementById('carrito');
  c.style.display = c.style.display==='block' ? 'none' : 'block';
}
</script>

</body>
</html>
